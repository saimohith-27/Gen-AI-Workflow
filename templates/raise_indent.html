{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <div class="card shadow-sm glass-card">
    <div class="card-body">
      <h4 class="mb-1">Raise Indent Request</h4>
      <p class="muted mb-4">Submit requirement details. AI will analyze, estimate budget, and assign to the right reviewer.</p>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Indent Title</label>
          <input type="text" name="title" class="form-control" placeholder="Example: 5 HDMI cables for client demo room" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Need Details</label>
          <textarea name="indent_text" class="form-control" rows="5" placeholder="Mention items like HDMI, mouse, laptop, desk, cleaners, and context for requirement." required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Budget Limit (Optional)</label>
          <input type="number" step="0.01" min="0" name="budget_limit" class="form-control" placeholder="Example: 50000">
        </div>

        <button class="btn btn-brand">Submit Indent</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
